<!-- Example: Grey image frame with clock icon -->
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Outer frame -->
  <rect x="5" y="5" width="70" height="70" rx="8" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
  <!-- Mountains (image icon) -->
  <path d="M15 55 L30 35 L45 50 L55 40 L65 55 Z" fill="#9ca3af"/>
  <!-- Clock circle overlay -->
  <circle cx="58" cy="22" r="14" fill="#6b7280"/>
  <line x1="58" y1="15" x2="58" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="22" x2="64" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>